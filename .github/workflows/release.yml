name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cli-e2e:
    name: CLI E2E / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter customize-agent build
      - name: Pack and install CLI
        shell: bash
        run: |
          cd apps/cli
          npm pack --json > pack.json
          TGZ=$(node -e "const p=require('./pack.json')[0];console.log(require('path').resolve(process.cwd(),p.filename))")
          mkdir -p "$RUNNER_TEMP/install-root"
          npm install "$TGZ" --prefix "$RUNNER_TEMP/install-root" --ignore-scripts=false --foreground-scripts
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize.cmd"
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent.cmd"
      - name: Start CLI and verify dashboard
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/home"
          node "$RUNNER_TEMP/install-root/node_modules/customize-agent/dist/index.js" > "$RUNNER_TEMP/cli.log" 2>&1 &
          node apps/cli/scripts/ci-check-dashboard.cjs
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-cli-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/cli.log
            ${{ runner.temp }}/home/.customize-agent/logs/**

  release:
    name: Release
    needs: cli-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages [ci-release]"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: customize-agent-v${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
          generate_release_notes: true
          draft: false
