name: CLI E2E

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter customize-agent build
      - name: Pack CLI
        shell: bash
        run: |
          cd apps/cli
          npm pack --json > pack.json
          node -e "const fs=require('fs'),path=require('path');const p=require('./pack.json')[0];fs.writeFileSync(process.env.RUNNER_TEMP+'/tgz.txt',path.resolve(process.cwd(),p.filename))"
      - name: Install packed CLI
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/install-root"
          npm install "$(cat "$RUNNER_TEMP/tgz.txt")" --prefix "$RUNNER_TEMP/install-root" --ignore-scripts=false --foreground-scripts
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize.cmd"
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent.cmd"
      - name: Start CLI and verify dashboard
        timeout-minutes: 5
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/home"
          node "$RUNNER_TEMP/install-root/node_modules/customize-agent/dist/index.js" > "$RUNNER_TEMP/cli.log" 2>&1 &
          cli_pid=$!
          if ! node apps/cli/scripts/ci-check-dashboard.cjs; then
            echo "::group::cli.log"
            test -f "$RUNNER_TEMP/cli.log" && cat "$RUNNER_TEMP/cli.log" || true
            echo "::endgroup::"
            echo "::group::customize-agent logs"
            for f in "$HOME"/.customize-agent/logs/*.log; do
              test -f "$f" || continue
              echo "--- $f ---"
              cat "$f"
            done
            echo "::endgroup::"
            echo "::group::server files"
            node -e "const fs=require('fs'),path=require('path');const root=path.join(process.env.HOME,'.customize-agent','server');function walk(d,n=0){if(n>2||!fs.existsSync(d))return;for(const e of fs.readdirSync(d,{withFileTypes:true}).slice(0,200)){console.log('  '.repeat(n)+e.name+(e.isDirectory()?'/':''));if(e.isDirectory())walk(path.join(d,e.name),n+1)}}walk(root)"
            echo "::endgroup::"
            kill "$cli_pid" 2>/dev/null || true
            exit 1
          fi
          kill "$cli_pid" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cli-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/cli.log
            ${{ runner.temp }}/home/.customize-agent/logs/**
