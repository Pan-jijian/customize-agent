name: CLI E2E

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        shell: bash
        run: |
          set +e
          pnpm --filter "./packages/**" build 2>&1 | tee "$RUNNER_TEMP/packages-build.log"
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            tail -n 80 "$RUNNER_TEMP/packages-build.log"
            echo "::error title=packages build failed::$(tail -n 20 "$RUNNER_TEMP/packages-build.log" | tr '\n' ' ')"
            exit "$status"
          fi
      - name: Build server dashboard
        shell: bash
        run: |
          set +e
          pnpm --filter @customize-agent/server build 2>&1 | tee "$RUNNER_TEMP/server-build.log"
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            tail -n 120 "$RUNNER_TEMP/server-build.log"
            echo "::error title=server build failed::$(tail -n 30 "$RUNNER_TEMP/server-build.log" | tr '\n' ' ')"
            exit "$status"
          fi
      - name: Build CLI package
        shell: bash
        run: |
          set +e
          pnpm --filter customize-agent build 2>&1 | tee "$RUNNER_TEMP/cli-build.log"
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            tail -n 120 "$RUNNER_TEMP/cli-build.log"
            echo "::error title=cli build failed::$(tail -n 30 "$RUNNER_TEMP/cli-build.log" | tr '\n' ' ')"
            exit "$status"
          fi
      - name: Pack CLI
        shell: bash
        run: |
          cd apps/cli
          npm pack --json > pack.json
          node -e "const fs=require('fs'),path=require('path');const p=require('./pack.json')[0];fs.writeFileSync(process.env.RUNNER_TEMP+'/tgz.txt',path.resolve(process.cwd(),p.filename))"
      - name: Install packed CLI
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/install-root"
          npm install "$(cat "$RUNNER_TEMP/tgz.txt")" --prefix "$RUNNER_TEMP/install-root" --ignore-scripts=false --foreground-scripts
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize.cmd"
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent.cmd"
      - name: Verify CLI startup web pages APIs upload and SQLite vector indexing
        timeout-minutes: 15
        shell: bash
        run: |
          set +e
          node apps/cli/test/upload-matrix.cjs "$RUNNER_TEMP/install-root/node_modules/customize-agent" 2>&1 | tee "$RUNNER_TEMP/upload-matrix.log"
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            tail -n 160 "$RUNNER_TEMP/upload-matrix.log"
            echo "::error title=upload matrix failed::$(tail -n 40 "$RUNNER_TEMP/upload-matrix.log" | tr '\n' ' ')"
            exit "$status"
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cli-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/packages-build.log
            ${{ runner.temp }}/server-build.log
            ${{ runner.temp }}/cli-build.log
            ${{ runner.temp }}/cli.log
            ${{ runner.temp }}/upload-matrix.log
            ${{ runner.temp }}/upload-home/.customize-agent/logs/**
            ${{ runner.temp }}/home/.customize-agent/logs/**
