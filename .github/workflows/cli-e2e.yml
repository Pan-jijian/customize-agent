name: CLI E2E

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Build server dashboard
        shell: bash
        run: pnpm --filter server build 2>&1 | tee "$RUNNER_TEMP/server-build.log"
      - name: Build CLI package
        shell: bash
        run: pnpm --filter customize-agent build 2>&1 | tee "$RUNNER_TEMP/cli-build.log"
      - name: Pack CLI
        shell: bash
        run: |
          cd apps/cli
          npm pack --json > pack.json
          node -e "const fs=require('fs'),path=require('path');const p=require('./pack.json')[0];fs.writeFileSync(process.env.RUNNER_TEMP+'/tgz.txt',path.resolve(process.cwd(),p.filename))"
      - name: Install packed CLI
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/install-root"
          npm install "$(cat "$RUNNER_TEMP/tgz.txt")" --prefix "$RUNNER_TEMP/install-root" --ignore-scripts=false --foreground-scripts
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize.cmd"
          test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent" || test -f "$RUNNER_TEMP/install-root/node_modules/.bin/customize-agent.cmd"
      - name: Start CLI and verify dashboard
        timeout-minutes: 10
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/home"
          package_root="$RUNNER_TEMP/install-root/node_modules/customize-agent"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            runner="$package_root/dist/bin/dashboard-runner.exe"
          else
            runner="$package_root/dist/bin/dashboard-runner"
          fi
          "$runner" run \
            --bundle "$package_root/dist/server-bundle" \
            --target "$HOME/.customize-agent/server" \
            --port 17321 \
            --project-root "$PWD" \
            --chroma-url http://127.0.0.1:17322 \
            --node "$(command -v node)" \
            --log "$RUNNER_TEMP/dashboard.log" \
            --timeout-ms 240000
      - name: Verify upload parsing chunking and Chroma indexing
        timeout-minutes: 15
        shell: bash
        run: |
          node apps/cli/test/upload-matrix.cjs "$RUNNER_TEMP/install-root/node_modules/customize-agent"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cli-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/server-build.log
            ${{ runner.temp }}/cli-build.log
            ${{ runner.temp }}/cli.log
            ${{ runner.temp }}/upload-home/.customize-agent/logs/**
            ${{ runner.temp }}/dashboard.log
            ${{ runner.temp }}/upload-dashboard.log
            ${{ runner.temp }}/upload-chroma.log
            ${{ runner.temp }}/home/.customize-agent/logs/**
